<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<title>Пропуск</title>
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Poppins:regular,700" rel="stylesheet" />
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
	<link rel="stylesheet" href="style.css">
    <link rel="manifest" href="pwa.webmanifest">
    <link rel="shortcut icon" href="icons/maskable_icon_x72.png" type="image/png">
	<script src="user.js" defer></script>
	<script src="theme.js" defer></script>
	<script src="communication.js" defer></script>
	<script src="main.js" defer></script>
</head>

<body class="colorizable">
	<div class="wrapper">
		<div class="navbar-container">
			<div class="navbar">Генератор пропусков</div>
			<button class="user-active button">Пользователь</button>
		</div>

		<div class="body-container">
			<div id="success" class="alert success" style="visibility: hidden" role="alert"></div>
			<div id="qr_wrapper" class="img-container">
				<img id="qr_image" class="img-thumbnail" alt="Отсутствует подключение к серверу">
			</div>
			<div id="error" class="alert error" role="alert">QR-код уже сгенерирован</div>
			<div class="button-container">
				<button type="button" class="generate-button button" id="generate" onclick="communication.getNewQr()">Обновить пропуск</button>
			</div>
		</div>
		
		<div id="login_container" class="form-container">
			<div class="form-body">
				<form action="#" class="form">
					<div class="form-text">Войдите в систему</div>
					<div class="form-item">
						<input class="form-input" type="text" placeholder="Имя">
					</div>
					<div class="form-item">
						<input class="form-input" type="password" placeholder="Пароль">
					</div>
					<div class="form-item">
						<button type="submit" class="form-button button" onclick="randomize()">Войти</button>
					</div>
				</form>
			</div>
		</div>

		<div id="user_container" class="form-container">
			<div class="form-body">
				<i class="fas fa-times user-close"></i> <!-- крестик -->
				<div id="userLabel" class="form-text">Вы вошли как ?</div>
				<div class="form-item">
					<button id="telegram_login" class="form-button button" onclick="tgLogin()">Залогиниться в Telegram-боте</button>
				</div>
				<div class="form-item">
					<button id="change_theme" class="form-button button" onclick="theme.changeTheme();">Сменить тему</button>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
