<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
    <link rel="shortcut icon" href="icons/Scanwalk144.png" type="image/png">
	<title>Получение данных...</title>
</head>

<script>
	let xhr = new XMLHttpRequest();
	xhr.open('POST', "https://scanwalk.herokuapp.com/api/v1/auth/token", true);
	xhr.setRequestHeader('Content-Type', 'application/json');
	xhr.setRequestHeader('Access-Control-Allow-Origin', '*');

	xhr.onreadystatechange = function () {
		localStorage.setItem('userToken', xhr.responseText);
		window.location.replace("generator.html");
	}

	xhr.send('{"id": ' + Math.floor(Math.random()*5 + 100000) + '}'); // Math.floor(Math.random() * (999999 - 100000) + 100000)
</script>

</html>
